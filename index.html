<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2e5a32" />
  <title>Greens 🌱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌱</text></svg>" />
  <style>
    :root { --bg: #11160f; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: var(--bg);
      font-family: ui-monospace, "Cascadia Code", "Courier New", monospace;
      color: #e8f0d8; user-select: none; -webkit-user-select: none; touch-action: none;
    }
    #stage {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 35%, #1c2618, #0a0d07);
    }
    canvas#game {
      image-rendering: pixelated; image-rendering: crisp-edges;
      background: #0a0d07; box-shadow: 0 0 0 2px #000, 0 8px 40px rgba(0,0,0,.7);
      max-width: 100vw; max-height: 100vh;
    }
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; z-index: 50;
      background: radial-gradient(circle at 50% 40%, #21331c, #0a0d07);
    }
    #loading h1 { font-size: 64px; letter-spacing: 4px; color: #aede6a; text-shadow: 0 3px 0 #2c4d1f, 0 6px 18px rgba(0,0,0,.6); }
    #loading .sprout { font-size: 56px; animation: bob 1.4s ease-in-out infinite; }
    #loading .bar { width: 240px; height: 10px; border: 2px solid #4a6b2f; border-radius: 6px; overflow: hidden; background: #16210f; }
    #loading .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6cae3a, #b6e86a); transition: width .15s; }
    #loading .tip { font-size: 13px; color: #8aa56a; max-width: 340px; text-align: center; }
    @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="480" height="270"></canvas>
  </div>
  <div id="loading">
    <div class="sprout">🌱</div>
    <h1>GREENS</h1>
    <div class="bar"><div class="fill" id="loadfill"></div></div>
    <div class="tip" id="loadtip">Tending the soil…</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
